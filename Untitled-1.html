<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lý Do Nên Yêu Tôi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d0d0d;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Khung chứa các slide */
        .slider-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Style chung cho mỗi slide */
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease-in-out;
            padding: 20px;
            text-align: center;
        }

        /* Slide nào có class active mới hiện lên */
        .slide.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Chữ to, nổi bật */
        .slide h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0px 4px 10px rgba(255, 255, 255, 0.3);
            font-weight: 700;
        }

        /* Khung chứa ảnh để không bị vỡ giao diện */
        .img-container {
            width: 100%;
            max-width: 500px;
            height: 350px;
            margin-bottom: 30px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Giúp ảnh tự khít khung mà ko bị méo */
        }

        /* Nút bấm ở góc dưới bên trái cho các slide đầu */
        .btn-next {
            position: absolute;
            bottom: 50px;
            left: 50px;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #000;
            background-color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }

        .btn-next:hover {
            background-color: #e6e6e6;
            transform: scale(1.05);
        }

        /* Responsive cho điện thoại */
        @media (max-width: 768px) {
            .slide h1 { font-size: 2rem; }
            .img-container { height: 280px; }
            .btn-next { left: 50%; transform: translateX(-50%); bottom: 40px; }
            .btn-next:hover { transform: translateX(-50%) scale(1.05); }
        }
    </style>
</head>

    <script>
        let currentSlideIndex = 0;
        const slides = document.querySelectorAll('.slide');
        const music = document.getElementById('bg-music');

        function nextSlide() {
            // Xóa class active của slide hiện tại
            slides[currentSlideIndex].classList.remove('active');
            
            // Tăng index lên slide tiếp theo
            currentSlideIndex++;
            
            // Thêm class active cho slide mới
            slides[currentSlideIndex].classList.add('active');

            // Nếu đang ở slide 4 ("Và đặc biệt là tôi yêu em" - index là 3)
            if (currentSlideIndex === 3) {
                // Đợi đúng 3000ms (3 giây) rồi tự động qua slide cuối
                setTimeout(() => {
                    slides[currentSlideIndex].classList.remove('active');
                    currentSlideIndex++;
                    slides[currentSlideIndex].classList.add('active');
                    
                    // Phát nhạc Careless Whisper ở slide cuối
                    // Do chính sách trình duyệt, nhạc tự chạy tốt nhất sau khi user đã có tương tác bấm nút trước đó
                    music.play().catch(error => {
                        console.log("Trình duyệt chặn tự động phát nhạc, cần click vào màn hình để nghe.");
                    });
                }, 3000);
            }
        }
    </script>
